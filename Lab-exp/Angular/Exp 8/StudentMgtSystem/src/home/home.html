<h1>Student Details</h1>
<h3>Name:{{name}}</h3>
<h3>Age:{{age}}</h3>
<h3>Course:{{course}}</h3>

<img [src] = "imagePath" height="250px" width="400px" >
<input type="button" style="display: block; margin-top: 10px;" value="Change Image" (click) = "toggleImage()">

<h1>Student Details</h1>

<input type="text" id="stdName" style="display: inline-block;" [(ngModel)] = "name">
<br>

<input type="text" id="stdAge" style="display: inline-block; margin-top: 2px;" [(ngModel)] = "age" >
<br>

<input type="text" id="stdCourse" style="display: inline-block; margin-top: 2px;" [(ngModel)] = "course">

<input type="button" style="display: block; margin-top: 5px;" value="Change Name" (click) = "changeName()">

<ul style="margin-top: 10px;">
    @for(city of cities; track $index)
    {
        <li>{{city}}</li>
    }
</ul>
