<div class="form-container glass-card">
  <h2>Add Transaction</h2>
  <form (ngSubmit)="onSubmit()" #txForm="ngForm">
    <div class="form-group">
      <label for="title">Title</label>
      <input 
        type="text" 
        id="title" 
        name="title" 
        class="form-control" 
        [(ngModel)]="model.title" 
        required
        placeholder="e.g. Salary, Groceries"
      >
    </div>

    <div class="form-group">
      <label for="amount">Amount (₹)</label>
      <input 
        type="number" 
        id="amount" 
        name="amount" 
        class="form-control" 
        [(ngModel)]="model.amount" 
        required
        min="0.01"
        step="0.01"
        placeholder="0.00"
      >
    </div>

    <div class="form-group">
      <label>Transaction Type</label>
      <div class="type-selector">
        <label class="radio-card" [class.selected]="model.type === 'income'">
          <input type="radio" name="type" [(ngModel)]="model.type" value="income">
          <span class="icon">📈</span> Income
        </label>
        
        <label class="radio-card expense" [class.selected]="model.type === 'expense'">
          <input type="radio" name="type" [(ngModel)]="model.type" value="expense">
          <span class="icon">📉</span> Expense
        </label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary submit-btn" [disabled]="!txForm.form.valid">
      Save Transaction
    </button>
  </form>
</div>
